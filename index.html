<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetCode Progress Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">

        <div class="header">
            <h1>LeetCode Progress Tracker</h1>
            <p>Track your DSA journey one problem at a time</p>
        </div>

        <div class="tracker-card">

            <div class="form-group">
                <label>Problem Name</label>
                <input
                    type="text"
                    id="problemName"
                    placeholder="e.g. Two Sum"
                >
            </div>

            <div class="form-group">
                <label>Difficulty</label>
                <select id="difficulty">
                    <option value="" disabled selected>
                        Select Difficulty
                    </option>
                    <option value="Easy">Easy</option>
                    <option value="Medium">Medium</option>
                    <option value="Hard">Hard</option>
                </select>
            </div>

        <div class="form-group">
            <label>Topics</label>

                <div class="tags-container" id="tagsContainer">
                    <button type="button" class="tag-btn" data-topic="Array">Array</button>
                    <button type="button" class="tag-btn" data-topic="Linked List">Linked List</button>
                    <button type="button" class="tag-btn" data-topic="Tree">Tree</button>
                    <button type="button" class="tag-btn" data-topic="Stack">Stack</button>
                    <button type="button" class="tag-btn" data-topic="Queue">Queue</button>
                    <button type="button" class="tag-btn" data-topic="Hash Table">Hash Table</button>
                    <button type="button" class="tag-btn" data-topic="Graph">Graph</button>
                    <button type="button" class="tag-btn" data-topic="DP">DP</button>
                    <button type="button" class="tag-btn" data-topic="Binary Search">Binary Search</button>
                    <button type="button" class="tag-btn" data-topic="Two Pointers">Two Pointers</button>
                </div>
        </div>
        
            <button id="addBtn">
                Add Problem
            </button>

        </div>

        <div class="problems-section">
            <h2>Problems Solved</h2>

            <div id="problems"></div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
